# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = ALT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT ALT, M, Music TUI, exec, omarchy-launch-or-focus-tui cliamp
bindd = ALT, V, VSCode, exec, omarchy-launch-or-focus code "uwsm-app -- code"
bindd = ALT, D, Docker, exec, omarchy-launch-tui lazydocker
# GitHub on SUPER + G (was: toggle window grouping in default bindings)
unbind = SUPER, G
bindd = ALT, G, GitHub, exec, omarchy-launch-or-focus-webapp GitHub "https://github.com/"
bindd = SUPER SHIFT, G, Toggle window grouping, togglegroup
bindd = ALT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# WhatsApp (moved from SUPER SHIFT ALT + G)
bindd = ALT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"

# File manager on ALT + E / SUPER + E
bindd = ALT, E, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window

# Full width on SUPER + F (was: fullscreen in default bindings)
unbind = SUPER, F
bindd = SUPER, F, Full screen, fullscreen, 0

bindd = ALT, C, Claude, exec, omarchy-launch-or-focus-webapp Claude "https://claude.ai/"
bindd = ALT, M, Gmail, exec, omarchy-launch-or-focus-webapp Gmail "https://mail.google.com/"
# Notion on ALT + N (was: Neovim in default bindings)
unbind = SUPER, N
bindd = ALT, N, Notion, exec, omarchy-launch-or-focus-webapp Notion "https://www.notion.so/"
bindd = ALT, Y, YouTube, exec, omarchy-launch-or-focus-webapp YouTube "https://www.youtube.com/"
bindd = ALT, L, LinkedIn, exec, omarchy-launch-or-focus-webapp LinkedIn "https://www.linkedin.com/"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Logitech MX Keys
bind = SUPER SHIFT, S, exec, omarchy-capture-screenshot      # Print Screen Button
# bind = SUPER, H, exec, voxtype record toggle                 # Dictation Button
# bind = SUPER, PERIOD, exec, omarchy-launch-walker -m symbols # Emoji Button

# Vim-style window focus (SUPER + hjkl)
# SUPER+J was: Toggle window split
# SUPER+K was: Show key bindings menu -> moved to SUPER+SHIFT+backslash
# SUPER+L was: Toggle workspace layout -> moved to SUPER+backslash
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
bindd = SUPER, H, Focus window left, movefocus, l
bindd = SUPER, J, Focus window down, movefocus, d
bindd = SUPER, K, Focus window up, movefocus, u
bindd = SUPER, L, Focus window right, movefocus, r
bindd = SUPER SHIFT, H, Swap window left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window right, swapwindow, r
bindd = SUPER, backslash, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
bindd = SUPER SHIFT, backslash, Show key bindings, exec, omarchy-menu-keybindings
